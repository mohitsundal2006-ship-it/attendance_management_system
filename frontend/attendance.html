<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance - Smart Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadAttendancePage()">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar navigation"></aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">Mark Attendance</h1>
        </header>

        <section class="glass-panel" style="padding: 1.5rem; margin-bottom: 2rem;">
            <div class="form-group" style="margin: 0; max-width: 400px;">
                <label for="classSelect">Select Scheduled Class</label>
                <select id="classSelect"></select>
            </div>
        </section>

        <form id="attendanceForm" onsubmit="markAttendance(event)">
            <section class="glass-panel table-container animate-fade-in" aria-label="Attendance table">
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Status (<span style="color: var(--success);">P</span> / <span style="color: var(--danger);">A</span>)</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-grid"></tbody>
                </table>
            </section>

            <button type="submit" id="submitBtn" class="btn btn-primary" style="margin-top: 2rem; display: none;">
                Save Attendance Records
            </button>
        </form>
    </main>
</body>
</html>
