<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadDashboard()">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar navigation"></aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">Admin Dashboard</h1>
            <div class="user-profile">
                <span style="color: var(--text-secondary);">Welcome back, Admin</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <section class="stats-grid animate-fade-in" aria-label="Dashboard stats">
            <article class="glass-panel stat-card">
                <span class="stat-title">Total Students</span>
                <span class="stat-value" id="stat-students">-</span>
            </article>
            <article class="glass-panel stat-card">
                <span class="stat-title">Total Subjects</span>
                <span class="stat-value" id="stat-stats">-</span>
            </article>
            <article class="glass-panel stat-card">
                <span class="stat-title">Avg Attendance</span>
                <span class="stat-value" id="stat-attendance">-</span>
            </article>
            <article class="glass-panel stat-card">
                <span class="stat-title">Defaulters Alert</span>
                <span class="stat-value" id="stat-defaulters">-</span>
            </article>
        </section>

        </main>
</body>
</html>
