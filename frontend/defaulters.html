<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defaulters - Smart Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadDefaulters()">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar navigation"></aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">Defaulter List (&lt; 80%)</h1>
        </header>

        <section class="glass-panel" style="background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.2); padding: 1.5rem; margin-bottom: 2rem;">
            <p style="color: var(--danger);">
                The following students have an attendance percentage below the mandatory 80% threshold.
            </p>
        </section>

        <section class="glass-panel table-container animate-fade-in" aria-label="Defaulters table">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Subject</th>
                        <th>Current Percentage</th>
                    </tr>
                </thead>
                <tbody id="defaulters-body"></tbody>
            </table>
        </section>
    </main>
</body>
</html>
