<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defaulters - Smart Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body onload="loadDefaulters()">
    <div id="sidebar" class="sidebar"></div>
    <main class="main-content">
        <header class="header">
            <h1 class="page-title">Defaulter List (< 80%)</h1>
        </header>
        <div class="glass-panel" style="background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.2); padding: 1.5rem; margin-bottom: 2rem;">
            <p style="color: var(--danger);"><i data-lucide="alert-circle" style="display:inline-block; vertical-align:middle; margin-right: 0.5rem;"></i> The following students have an attendance percentage below the mandatory 80% threshold.</p>
        </div>
        <div class="glass-panel table-container animate-fade-in">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Subject</th>
                        <th>Current Percentage</th>
                    </tr>
                </thead>
                <tbody id="defaulters-body"></tbody>
            </table>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
