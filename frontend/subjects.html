<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - Smart Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadSubjects()">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar navigation"></aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">Manage Subjects</h1>
        </header>

        <section class="glass-panel table-container animate-fade-in" aria-label="Subjects table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Subject Name</th>
                        <th>Assigned Faculty</th>
                    </tr>
                </thead>
                <tbody id="subjects-body"></tbody>
            </table>
        </section>
    </main>
</body>
</html>
